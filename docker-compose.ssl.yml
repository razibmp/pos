services:

  mysql:
    image: mysql:8.0
    container_name: hc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
    container_name: hc-api
    expose:
      - "3001"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
      PATHAO_CLIENT_ID: ${PATHAO_CLIENT_ID}
      PATHAO_CLIENT_SECRET: ${PATHAO_CLIENT_SECRET}
      PATHAO_USERNAME: ${PATHAO_USERNAME}
      PATHAO_PASSWORD: ${PATHAO_PASSWORD}
      PATHAO_STORE_ID: ${PATHAO_STORE_ID}
      PATHAO_CITY_ID: ${PATHAO_CITY_ID}
      PATHAO_ZONE_ID: ${PATHAO_ZONE_ID}
      PATHAO_SENDER_NAME: ${PATHAO_SENDER_NAME}
      PATHAO_SENDER_PHONE: ${PATHAO_SENDER_PHONE}
      PATHAO_SENDER_ADDRESS: ${PATHAO_SENDER_ADDRESS}
      PATHAO_WEBHOOK_SECRET: ${PATHAO_WEBHOOK_SECRET}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_REPORT_TO: ${EMAIL_REPORT_TO}
      WC_URL: ${WC_URL}
      WC_KEY: ${WC_KEY}
      WC_SECRET: ${WC_SECRET}
      WC_WEBHOOK_SECRET: ${WC_WEBHOOK_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: hc-frontend
    expose:
      - "80"
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: hc-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  mysql-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
