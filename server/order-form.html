<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Order — The Hobby Center</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#FF6B35,#FF8C42 50%,#FFD166);min-height:100vh;padding:20px}
.container{max-width:480px;margin:0 auto}
.header{text-align:center;padding:24px 0 20px}
.header h1{font-family:'Baloo 2',cursive;font-size:28px;font-weight:800;color:#fff}
.header p{color:rgba(255,255,255,.85);font-size:13px;margin-top:4px}
.card{background:#fff;border-radius:20px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.field{margin-bottom:16px}
label{display:block;font-size:11px;font-weight:800;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
input,select,textarea{width:100%;border:1.5px solid #F0D9C0;border-radius:10px;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:14px;color:#1A1A2E;background:#FFFAF7;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:#FF6B35}
textarea{resize:vertical;min-height:80px}
.delivery-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.delivery-option{border:1.5px solid #F0D9C0;border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:all .2s}
.delivery-option.selected{border-color:#FF6B35;background:#FFF3ED}
.delivery-option .charge{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:#FF6B35}
.delivery-option .dlabel{font-size:11px;color:#6B7280;font-weight:700;margin-top:2px}
.product-card{border:1.5px solid #F0D9C0;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s;margin-bottom:6px}
.product-card.selected{border-color:#FF6B35;background:#FFF3ED}
.product-card .emoji{font-size:24px;flex-shrink:0}
.product-card .info{flex:1;min-width:0}
.product-card .pname{font-weight:800;font-size:13px;color:#1A1A2E}
.product-card .pstock{font-size:11px;color:#9CA3AF;margin-top:1px}
.product-card .pprice{font-family:'Baloo 2',cursive;font-size:16px;font-weight:800;color:#FF6B35;flex-shrink:0}
.qty-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.qty-btn{width:36px;height:36px;border:1.5px solid #F0D9C0;border-radius:8px;background:#FFFAF7;font-size:18px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#1A1A2E;flex-shrink:0;transition:all .2s}
.qty-btn:hover{border-color:#FF6B35;background:#FFF3ED}
.qty-val{font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;color:#1A1A2E;min-width:32px;text-align:center}
.summary{background:#FFF8F0;border-radius:12px;padding:14px;margin:16px 0;border:1.5px solid #F0D9C0}
.summary-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;font-weight:700;color:#6B7280}
.summary-total{display:flex;justify-content:space-between;font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:#FF6B35;border-top:1.5px dashed #F0D9C0;padding-top:10px;margin-top:6px}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#FF6B35,#FF8C42);color:#fff;border:none;border-radius:12px;font-family:'Baloo 2',cursive;font-size:16px;font-weight:800;cursor:pointer;margin-top:8px;box-shadow:0 4px 16px rgba(255,107,53,.4)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.error{background:#FEE2E2;color:#991B1B;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;margin-top:10px;display:none}
.success{text-align:center;padding:20px 0}
.success .icon{font-size:60px;margin-bottom:12px}
.success h2{font-family:'Baloo 2',cursive;font-size:22px;font-weight:800;color:#1A1A2E;margin-bottom:8px}
.success p{color:#6B7280;font-size:13px;margin-bottom:4px}
.tracking-box{background:#FFF8F0;border-radius:12px;padding:16px;margin-top:16px;border:1.5px solid #F0D9C0;text-align:left}
.tracking-box .tlabel{font-size:10px;font-weight:800;color:#9CA3AF;text-transform:uppercase;margin-bottom:2px}
.tracking-box .tvalue{font-family:'Baloo 2',cursive;font-size:17px;font-weight:800;color:#FF6B35;margin-bottom:10px}
.note{font-size:11px;color:#9CA3AF;text-align:center;margin-top:8px;line-height:1.5}
.loading-products{text-align:center;color:#9CA3AF;font-size:13px;padding:16px 0}
.search-box{width:100%;border:1.5px solid #F0D9C0;border-radius:10px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:13px;color:#1A1A2E;background:#FFFAF7;outline:none;margin-bottom:10px}
.search-box:focus{border-color:#FF6B35}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div style="font-size:48px">🎮</div>
    <h1>The Hobby Center</h1>
    <p>📍 Pallabi, Mirpur-12, Dhaka · 01839000021</p>
  </div>
  <div class="card" id="mainCard">
    <h2 style="font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;color:#1A1A2E;margin-bottom:18px">🛒 Place Your Order</h2>

    <div class="field">
      <label>Your Name *</label>
      <input type="text" id="customerName" placeholder="e.g. Razib Ahmed"/>
    </div>

    <div class="field">
      <label>Phone Number * (01XXXXXXXXX)</label>
      <input type="tel" id="customerPhone" placeholder="01XXXXXXXXX"/>
    </div>

    <div class="field">
      <label>Delivery Address *</label>
      <textarea id="customerAddress" placeholder="House no, Road, Area, City"></textarea>
    </div>

    <div class="field">
      <label>Select Product *</label>
      <input type="text" class="search-box" id="productSearch" placeholder="🔍 Search products..." oninput="filterProducts()" style="margin-bottom:10px"/>
      <div id="productList"><div class="loading-products">⏳ Loading products...</div></div>
    </div>

    <div class="field" id="qtyField" style="display:none">
      <label>Quantity</label>
      <div class="qty-row">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <div class="qty-val" id="qtyVal">1</div>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
        <div style="font-size:12px;color:#9CA3AF;font-weight:700;margin-left:4px">× <span id="selectedPriceLbl">৳0</span> each</div>
      </div>
    </div>

    <div class="field">
      <label>Delivery Zone *</label>
      <div class="delivery-options">
        <div class="delivery-option selected" id="opt-inside" onclick="selectDelivery('inside')">
          <div class="charge">৳80</div>
          <div class="dlabel">🏙️ Inside Dhaka</div>
        </div>
        <div class="delivery-option" id="opt-outside" onclick="selectDelivery('outside')">
          <div class="charge">৳150</div>
          <div class="dlabel">🗺️ Outside Dhaka</div>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Special Instructions (Optional)</label>
      <input type="text" id="instructions" placeholder="e.g. Please pack carefully"/>
    </div>

    <div class="summary">
      <div class="summary-row"><span>Product Price</span><span id="s-price">৳0</span></div>
      <div class="summary-row"><span>Delivery Charge</span><span id="s-delivery">৳80</span></div>
      <div class="summary-total"><span>Total COD Amount</span><span id="s-total">৳80</span></div>
    </div>

    <div class="error" id="errorMsg"></div>
    <button class="btn" id="submitBtn" onclick="submitOrder()">🛵 Place Order</button>
    <p class="note">Cash on Delivery via Pathao · Delivery 1-3 working days<br/>Questions? Call 01839000021</p>
  </div>
</div>

<script>
let deliveryType = 'inside';
let qty = 1;
let selectedProduct = null;
let allProducts = [];

// Load products on page load
(async function loadProducts() {
  try {
    const res = await fetch('/api/products/public');
    allProducts = await res.json();
    renderProducts(allProducts);
  } catch(e) {
    document.getElementById('productList').innerHTML = '<div class="loading-products">⚠️ Could not load products. Please call 01839000021.</div>';
  }
})();

function filterProducts() {
  const q = document.getElementById('productSearch').value.toLowerCase();
  const filtered = q ? allProducts.filter(p => p.name.toLowerCase().includes(q)) : allProducts;
  renderProducts(filtered);
}

function renderProducts(list) {
  const el = document.getElementById('productList');
  if (list.length === 0) {
    el.innerHTML = '<div class="loading-products">No products found</div>';
    return;
  }
  el.innerHTML = list.map(p => `
    <div class="product-card ${selectedProduct && selectedProduct.id === p.id ? 'selected' : ''}" onclick="selectProduct(${p.id})">
      <div class="emoji">${p.emoji || '🎮'}</div>
      <div class="info">
        <div class="pname">${p.name}</div>
        <div class="pstock">Stock: ${p.stock} available</div>
      </div>
      <div class="pprice">৳${Number(p.sell).toLocaleString('en-IN')}</div>
    </div>
  `).join('');
}

function selectProduct(id) {
  selectedProduct = allProducts.find(p => p.id === id);
  qty = 1;
  document.getElementById('qtyVal').textContent = '1';
  document.getElementById('qtyField').style.display = selectedProduct ? 'block' : 'none';
  if (selectedProduct) {
    document.getElementById('selectedPriceLbl').textContent = '৳' + Number(selectedProduct.sell).toLocaleString('en-IN');
  }
  renderProducts(allProducts.filter(p => {
    const q = document.getElementById('productSearch').value.toLowerCase();
    return !q || p.name.toLowerCase().includes(q);
  }));
  updateTotal();
}

function changeQty(delta) {
  if (!selectedProduct) return;
  qty = Math.max(1, Math.min(selectedProduct.stock, qty + delta));
  document.getElementById('qtyVal').textContent = qty;
  updateTotal();
}

function selectDelivery(type) {
  deliveryType = type;
  document.getElementById('opt-inside').className  = 'delivery-option' + (type==='inside'  ? ' selected' : '');
  document.getElementById('opt-outside').className = 'delivery-option' + (type==='outside' ? ' selected' : '');
  updateTotal();
}

function updateTotal() {
  const charge = deliveryType === 'outside' ? 150 : 80;
  const price  = selectedProduct ? selectedProduct.sell * qty : 0;
  const total  = price + charge;
  document.getElementById('s-price').textContent    = '৳' + price.toLocaleString('en-IN');
  document.getElementById('s-delivery').textContent  = '৳' + charge;
  document.getElementById('s-total').textContent     = '৳' + total.toLocaleString('en-IN');
}

async function submitOrder() {
  const name    = document.getElementById('customerName').value.trim();
  const phone   = document.getElementById('customerPhone').value.trim();
  const address = document.getElementById('customerAddress').value.trim();
  const notes   = document.getElementById('instructions').value.trim();
  const errEl   = document.getElementById('errorMsg');

  errEl.style.display = 'none';

  if (!name)    { showError('Please enter your name'); return; }
  if (!phone || phone.length < 10) { showError('Please enter a valid phone number'); return; }
  if (!address) { showError('Please enter your delivery address'); return; }
  if (!selectedProduct) { showError('Please select a product'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Placing order...';

  try {
    const charge = deliveryType === 'outside' ? 150 : 80;
    const price  = selectedProduct.sell * qty;
    const total  = price + charge;

    const res = await fetch('/api/orders/public', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        customer_name   : name,
        customer_phone  : phone,
        customer_address: address,
        product_name    : selectedProduct.name,
        product_id      : selectedProduct.id,
        qty             : qty,
        sell_price      : price,
        delivery_type   : deliveryType,
        delivery_charge : charge,
        total,
        notes,
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Order failed');
    showSuccess(data, charge, price);
  } catch(e) {
    showError(e.message);
    btn.disabled = false;
    btn.textContent = '🛵 Place Order';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}

function showSuccess(data, charge, price) {
  document.getElementById('mainCard').innerHTML = `
    <div class="success">
      <div class="icon">✅</div>
      <h2>Order Received!</h2>
      <p>Thank you <strong>${data.customer_name}</strong>!</p>
      <p>We will review your order and arrange delivery via Pathao.</p>
      <div class="tracking-box">
        <div class="tlabel">Order Number</div>
        <div class="tvalue">${data.inv}</div>
        <div class="tlabel">Product Price</div>
        <div class="tvalue">৳${Number(price).toLocaleString('en-IN')}</div>
        <div class="tlabel">Delivery Charge</div>
        <div class="tvalue">৳${charge}</div>
        <div class="tlabel">Total COD Amount</div>
        <div class="tvalue" style="color:#06D6A0">৳${Number(data.total).toLocaleString('en-IN')}</div>
      </div>
      <p style="margin-top:16px;color:#9CA3AF;font-size:12px">Delivery 1-3 working days · Questions? Call 01839000021</p>
    </div>
  `;
}
</script>
</body>
</html>
